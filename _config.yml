about_content: | # this will include new lines to allow paragraphs
  I am currently pursuing a combined M.S/Ph.D. degree in the Department of Electrical and computer engineering at SungKyunKwan University. 
  My research focuses on Deep/Convolutional Neural Network (D/CNN) mapping in the Processing‑In‑Memory (PIM) architecture for energy‑efficient and faster PIM‑based D/CNN inference. 
  To achieve this goal, I am exploring diverse approaches including weight mapping, pattern‑based pruning, and kernel shape control (KERNTROL).
  [*CV*](https://drive.google.com/file/d/1Gq9PQUPtsBq77JTQbqCbEPflEEz61Tr1/view?usp=sharing)

